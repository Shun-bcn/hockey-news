<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hockey Deflect - フィールドホッケーニュース</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-1TEB39TPRY"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-1TEB39TPRY');
  </script>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-top">
        <h1 class="site-title">🏑 Hockey Deflect</h1>
        <div class="header-meta">
          <span id="last-updated"></span>
          <button id="theme-toggle" class="icon-btn" title="テーマ切替">🌙</button>
        </div>
      </div>

      <!-- 言語切替 -->
      <div class="lang-bar">
        <button class="lang-btn active" data-lang="ja">🇯🇵 日本語</button>
        <button class="lang-btn" data-lang="en">🇬🇧 English</button>
        <button class="lang-btn" data-lang="nl">🇳🇱 Nederlands</button>
        <button class="lang-btn" data-lang="es">🇪🇸 Español</button>
        <button class="lang-btn" data-lang="hi">🇮🇳 हिन्दी</button>
      </div>

      <!-- カテゴリフィルター -->
      <div class="filter-bar" id="category-filters">
        <button class="filter-btn active" data-cat="all">すべて</button>
        <button class="filter-btn" data-cat="試合結果">試合結果</button>
        <button class="filter-btn" data-cat="代表チーム">代表チーム</button>
        <button class="filter-btn" data-cat="リーグ">リーグ</button>
        <button class="filter-btn" data-cat="選手">選手</button>
        <button class="filter-btn" data-cat="テクノロジー">テクノロジー</button>
        <button class="filter-btn" data-cat="ルール">ルール</button>
        <button class="filter-btn" data-cat="スポンサー・パートナー">スポンサー</button>
        <button class="filter-btn" data-cat="その他">その他</button>
      </div>

      <!-- キーワード検索 -->
      <div class="search-bar">
        <input type="text" id="search-input" class="search-input" placeholder="キーワード検索..." autocomplete="off">
        <button id="search-btn" class="search-btn">Search</button>
      </div>

      <!-- ソート + 日付ナビ -->
      <div class="nav-bar">
        <div class="date-nav">
          <button id="prev-day" class="icon-btn">←</button>
          <span id="current-date"></span>
          <button id="next-day" class="icon-btn" disabled>→</button>
        </div>
        <div class="sort-toggle">
          <button class="sort-btn active" data-sort="newest">新着順</button>
          <button class="sort-btn" data-sort="source">ソース別</button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <div id="articles-container">
      <div id="loading" class="loading">読み込み中...</div>
    </div>
    <div id="no-articles" class="no-articles" style="display:none">
      <p>この日のニュースはありません</p>
    </div>
  </main>

  <footer>
    <p>Hockey Deflect — フィールドホッケー専用グローバルニュース / Global Field Hockey News</p>
    <p class="footer-note">記事の要約はAIにより自動生成されています。元記事は各リンク先でご確認ください。<br>Article summaries are AI-generated. Please visit each link for the original article.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
