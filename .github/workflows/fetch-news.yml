name: Fetch Hockey News

on:
  schedule:
    - cron: '0 1 * * *'   # 毎日01:00 UTC（欧州時間03:00 CEST / 日本時間10:00 JST）に実行
  workflow_dispatch:       # 手動実行も可能

permissions:
  contents: write          # data/*.json をコミットするために必要

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch and process news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/fetch.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --staged --quiet || git commit -m "chore: update news data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy public --project-name=hockey-deflect
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
